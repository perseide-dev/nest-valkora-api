services:
  api:
    build:
      context: .
      target: development
    command: pnpm run start:dev
    ports:
      - "${PORT:-3115}:3115"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - .env
    environment:
      DB_HOST: db
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    networks:
      - valkora-network

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - valkora-network

networks:
  valkora-network:
    driver: bridge

volumes:
  pgdata:
